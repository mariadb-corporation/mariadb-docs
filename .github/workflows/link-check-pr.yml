name: Check Links in PR

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  link-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get changed files
        id: changes
        uses: tj-actions/changed-files@v45
        with:
          files: |
            **.md
            **.html
          # agent-skills/topical/ is vendored verbatim from MariaDB/skills
          # (see agent-skills/topical/VENDORED.md). Link fixes go upstream, not
          # here. Our own authored skills under agent-skills/granular/ stay in scope.
          files_ignore: |
            agent-skills/topical/**

      - name: Scan for broken links
        if: steps.changes.outputs.any_changed == 'true'
        uses: lycheeverse/lychee-action@v2.3.0
        with:
          # ADDED: Excludes for both raw '{' and encoded '%7B'
          # Flaky/example external hosts (bottom of the list): mcs1 is a
          # placeholder hostname in ColumnStore cmapi curl samples; the rest
          # time out, rate-limit (429), or return cert errors from CI but are
          # otherwise valid links.
          args: >-
            --no-progress
            --exclude dev\.mysql\.com
            --exclude docs\.oracle\.com
            --exclude kubernetes\.io\/docs
            --exclude '.*\{.*'
            --exclude '.*%7B.*'
            --exclude localhost
            --exclude 127\.0\.0\.1
            --exclude 'http://localhost:[0-9]+.*'
            --exclude 'https://localhost:[0-9]+.*'
            --exclude access\.redhat\.com
            --exclude docs\.redhat\.com
            --exclude blogs\.oracle\.com
            --exclude bugs\.mysql\.com
            --exclude forums\.mysql\.com
            --exclude www\.mysql\.com
            --exclude en\.opensuse\.org
            --exclude www\.cyberciti\.biz
            --exclude linux\.die\.net
            --exclude mariadb\.org\/feedback_plugin
            --exclude r\.mariadb\.com
            --exclude security-certs\.docs\.ubuntu\.com
            --exclude www\.linux-pam\.org
            --exclude www\.bzip\.org
            --exclude selinuxproject\.org
            --exclude www\.gnu\.org
            --exclude manpages\.ubuntu\.com
            --exclude packages\.ubuntu\.com
            --exclude www\.canonware\.com
            --exclude www\.npmjs\.com
            --exclude npmjs\.org
            --exclude mcs1
            --exclude s\.petrunia\.net
            --exclude mysql\.taobao\.org
            --exclude www\.shannon-sys\.com
            --exclude www\.hashicorp\.com
            ${{ steps.changes.outputs.all_changed_files }}
          fail: true
          # Don't error when the changed files contain no links to check. lychee
          # otherwise exits non-zero with "No links were found", which is a false
          # failure for link-free pages (e.g. nav stubs). See DOCS-6272.
          failIfEmpty: false

      - name: 📖 Help & Documentation
        if: failure()
        run: |
          echo "### ❌ Link Check Failed?" >> $GITHUB_STEP_SUMMARY
          echo "👉 [**Read the SOP: How to Fix Link Errors**](https://mariadbcorp.atlassian.net/wiki/spaces/DOCS/pages/3284140040/Pull+Requests#Method-1%3A-The-%22Quick-Fix%22-(Recommended))" >> $GITHUB_STEP_SUMMARY

